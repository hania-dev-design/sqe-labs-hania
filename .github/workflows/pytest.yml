name: Run Pytest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    
    - name: Install pytest
      run: pip install pytest
    
    - name: Run tests
      working-directory:./week1
      run: pytest -v
